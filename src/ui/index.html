<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>forgectl</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            shell: "#0a0a0b",
            panel: "#111215",
            panel2: "#15171b",
            line: "#2a2d33",
            muted: "#8f97a5",
            code: "#4da3ff",
            research: "#a78bfa",
            content: "#4ade80",
            data: "#fb923c",
            ops: "#f87171",
            general: "#7dd3fc"
          },
          boxShadow: {
            glow: "0 0 0 1px rgba(255,255,255,0.05), 0 12px 40px rgba(0,0,0,0.35)"
          }
        }
      }
    };
  </script>

  <style>
    :root {
      color-scheme: dark;
    }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(1200px 600px at 90% -10%, rgba(77, 163, 255, 0.09), transparent 60%),
        radial-gradient(900px 600px at 0% 100%, rgba(74, 222, 128, 0.07), transparent 60%),
        #0a0a0b;
      color: #eef2f8;
      font-family: "Space Grotesk", sans-serif;
    }
    .mono {
      font-family: "IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    .grid-noise::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 36px 36px;
      opacity: 0.3;
    }
    .pulse {
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(77, 163, 255, 0.35); }
      50% { box-shadow: 0 0 0 8px rgba(77, 163, 255, 0); }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useMemo, useState, useRef } = React;

    const API = "";

    const WORKFLOW_COLORS = {
      code: "#4da3ff",
      research: "#a78bfa",
      content: "#4ade80",
      data: "#fb923c",
      ops: "#f87171",
      general: "#7dd3fc",
    };

    const STATUS_COLORS = {
      pending: "#4b5563",
      queued: "#4b5563",
      running: "#4da3ff",
      completed: "#22c55e",
      failed: "#ef4444",
      skipped: "#6b7280",
    };

    const WORKFLOWS = ["code", "research", "content", "data", "ops", "general"];
    const AGENTS = ["codex", "claude-code"];

    function fetchJson(path, options) {
      return fetch(`${API}${path}`, options).then(async (res) => {
        const text = await res.text();
        let data = null;
        try {
          data = text ? JSON.parse(text) : null;
        } catch {
          data = text;
        }
        if (!res.ok) {
          const message = data?.error || data?.message || `HTTP ${res.status}`;
          throw new Error(message);
        }
        return data;
      });
    }

    function formatTime(ts) {
      if (!ts) return "-";
      return new Date(ts).toLocaleTimeString();
    }

    function durationMs(node) {
      if (node?.result?.durationMs != null) return `${Math.round(node.result.durationMs / 1000)}s`;
      if (!node?.startedAt) return "-";
      const end = node.completedAt ? new Date(node.completedAt) : new Date();
      const ms = end - new Date(node.startedAt);
      return `${Math.max(0, Math.round(ms / 1000))}s`;
    }

    function slugify(value) {
      const base = (value || "node").toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "");
      return base || "node";
    }

    function normalizePipeline(input) {
      const pipeline = input && typeof input === "object" ? input : {};
      const defaults = pipeline.defaults && typeof pipeline.defaults === "object" ? pipeline.defaults : {};
      const rawNodes = Array.isArray(pipeline.nodes) ? pipeline.nodes : [];
      return {
        name: pipeline.name || "new-pipeline",
        description: pipeline.description || "",
        defaults: {
          workflow: defaults.workflow || "code",
          agent: defaults.agent || "codex",
          repo: defaults.repo || "",
        },
        nodes: rawNodes.map((node, idx) => ({
          id: node.id || `node-${idx + 1}`,
          task: node.task || "",
          workflow: node.workflow || defaults.workflow || "code",
          agent: node.agent || defaults.agent || "codex",
          repo: node.repo || "",
          depends_on: Array.isArray(node.depends_on) ? node.depends_on : [],
        }))
      };
    }

    function toPipelineDefinition(builderState) {
      const defaults = {};
      if (builderState.defaults.workflow) defaults.workflow = builderState.defaults.workflow;
      if (builderState.defaults.agent) defaults.agent = builderState.defaults.agent;
      if (builderState.defaults.repo) defaults.repo = builderState.defaults.repo;

      const nodes = builderState.nodes.map((n) => {
        const item = {
          id: n.id,
          task: n.task,
          workflow: n.workflow,
          agent: n.agent,
        };
        if (n.depends_on && n.depends_on.length > 0) item.depends_on = n.depends_on;
        if (n.repo) item.repo = n.repo;
        return item;
      });

      const out = {
        name: builderState.name,
        description: builderState.description || undefined,
        defaults,
        nodes,
      };
      if (!out.description) delete out.description;
      return out;
    }

    function validateBuilder(state) {
      const errors = [];
      if (!state.name.trim()) errors.push("Pipeline name is required");
      if (state.nodes.length === 0) errors.push("Add at least one node");

      const seen = new Set();
      for (const node of state.nodes) {
        if (!node.id.trim()) {
          errors.push("Each node needs an ID");
          continue;
        }
        if (seen.has(node.id)) errors.push(`Duplicate node ID: ${node.id}`);
        seen.add(node.id);
        if (!/^[a-z0-9-]+$/.test(node.id)) {
          errors.push(`Invalid node ID "${node.id}" (use lowercase letters, numbers, hyphens)`);
        }
        if (!node.task.trim()) errors.push(`Node ${node.id} is missing a task`);
      }

      for (const node of state.nodes) {
        for (const dep of node.depends_on || []) {
          if (!seen.has(dep)) errors.push(`Node ${node.id} depends on unknown node ${dep}`);
          if (dep === node.id) errors.push(`Node ${node.id} cannot depend on itself`);
        }
      }

      return errors;
    }

    function topologicalLevels(nodes) {
      const ids = nodes.map((n) => n.id);
      const indegree = {};
      const edges = {};
      const level = {};

      for (const id of ids) {
        indegree[id] = 0;
        edges[id] = [];
        level[id] = 0;
      }

      for (const node of nodes) {
        const deps = node.depends_on || [];
        for (const dep of deps) {
          if (!edges[dep]) continue;
          edges[dep].push(node.id);
          indegree[node.id] += 1;
        }
      }

      const queue = ids.filter((id) => indegree[id] === 0).sort();
      const order = [];

      while (queue.length > 0) {
        const id = queue.shift();
        order.push(id);
        const outgoing = edges[id] || [];
        for (const next of outgoing) {
          level[next] = Math.max(level[next] || 0, (level[id] || 0) + 1);
          indegree[next] -= 1;
          if (indegree[next] === 0) queue.push(next);
        }
        queue.sort();
      }

      if (order.length !== nodes.length) {
        let row = 0;
        for (const id of ids) {
          if (!order.includes(id)) {
            level[id] = row;
            row += 1;
          }
        }
      }

      return level;
    }

    function computeLayout(nodes) {
      const levelMap = topologicalLevels(nodes);
      const grouped = {};
      for (const node of nodes) {
        const lvl = levelMap[node.id] || 0;
        if (!grouped[lvl]) grouped[lvl] = [];
        grouped[lvl].push(node);
      }

      const levels = Object.keys(grouped).map((n) => Number(n)).sort((a, b) => a - b);
      for (const lvl of levels) grouped[lvl].sort((a, b) => a.id.localeCompare(b.id));

      const xGap = 280;
      const yGap = 180;
      const nodeW = 220;
      const nodeH = 112;

      const positions = {};
      for (const lvl of levels) {
        grouped[lvl].forEach((node, idx) => {
          positions[node.id] = {
            x: 40 + idx * xGap,
            y: 40 + lvl * yGap,
            width: nodeW,
            height: nodeH,
          };
        });
      }

      const maxCols = Math.max(1, ...levels.map((lvl) => grouped[lvl].length));
      const width = 80 + maxCols * xGap;
      const height = 120 + Math.max(1, levels.length) * yGap;

      const edges = [];
      for (const node of nodes) {
        for (const dep of node.depends_on || []) {
          if (positions[dep] && positions[node.id]) {
            edges.push({ from: dep, to: node.id });
          }
        }
      }

      return { positions, edges, width, height, levelMap };
    }

    function StatusPill({ status }) {
      const color = STATUS_COLORS[status] || STATUS_COLORS.pending;
      return (
        <span
          className="mono text-xs px-2 py-1 rounded border"
          style={{ borderColor: `${color}66`, color }}
        >
          {status || "pending"}
        </span>
      );
    }

    function MiniDagPreview({ pipeline }) {
      const nodes = pipeline?.nodes || [];
      if (nodes.length === 0) return <p className="text-xs text-muted">No nodes</p>;
      const levels = topologicalLevels(nodes);
      const grouped = {};
      for (const node of nodes) {
        const lvl = levels[node.id] || 0;
        if (!grouped[lvl]) grouped[lvl] = [];
        grouped[lvl].push(node);
      }
      const rows = Object.keys(grouped).map((n) => Number(n)).sort((a, b) => a - b);
      return (
        <div className="space-y-1">
          {rows.map((row) => (
            <div key={row} className="flex flex-wrap gap-1">
              {grouped[row].map((node) => (
                <span key={node.id} className="mono text-[10px] px-2 py-0.5 rounded border border-line bg-panel2 text-slate-300">
                  {node.id}
                </span>
              ))}
            </div>
          ))}
        </div>
      );
    }

    function DagPreview({ nodes, nodeStates, selectedNodeId, onSelectNode }) {
      const layout = useMemo(() => computeLayout(nodes), [nodes]);

      if (!nodes || nodes.length === 0) {
        return <div className="rounded-xl border border-line bg-panel p-6 text-sm text-muted">Add nodes to preview the DAG.</div>;
      }

      return (
        <div className="rounded-xl border border-line bg-panel overflow-auto">
          <div className="relative" style={{ width: layout.width, height: layout.height }}>
            <svg className="absolute inset-0 pointer-events-none" width={layout.width} height={layout.height}>
              {layout.edges.map((edge, idx) => {
                const from = layout.positions[edge.from];
                const to = layout.positions[edge.to];
                if (!from || !to) return null;
                const x1 = from.x + from.width / 2;
                const y1 = from.y + from.height;
                const x2 = to.x + to.width / 2;
                const y2 = to.y;
                const midY = y1 + (y2 - y1) / 2;
                const d = `M ${x1} ${y1} C ${x1} ${midY}, ${x2} ${midY}, ${x2} ${y2}`;
                return <path key={`${edge.from}-${edge.to}-${idx}`} d={d} stroke="#3b4250" strokeWidth="2" fill="none" />;
              })}
            </svg>

            {nodes.map((node) => {
              const pos = layout.positions[node.id];
              if (!pos) return null;
              const state = nodeStates?.[node.id] || {};
              const status = state.status || "pending";
              const workflowColor = WORKFLOW_COLORS[node.workflow || "general"] || WORKFLOW_COLORS.general;
              const statusColor = STATUS_COLORS[status] || STATUS_COLORS.pending;
              const selected = selectedNodeId === node.id;

              return (
                <button
                  key={node.id}
                  type="button"
                  onClick={() => onSelectNode && onSelectNode(node.id)}
                  className={`absolute text-left rounded-xl border bg-panel2 p-3 transition ${status === "running" ? "pulse" : ""} ${selected ? "ring-2 ring-code" : ""}`}
                  style={{
                    left: pos.x,
                    top: pos.y,
                    width: pos.width,
                    height: pos.height,
                    borderColor: `${statusColor}66`,
                  }}
                >
                  <div className="flex items-center justify-between gap-2">
                    <span className="mono text-xs font-semibold" style={{ color: workflowColor }}>{node.id}</span>
                    <span className="mono text-[10px] uppercase tracking-wide" style={{ color: statusColor }}>{status}</span>
                  </div>
                  <p className="text-xs text-slate-300 mt-2 line-clamp-2">{node.task || "No task"}</p>
                  <div className="flex items-center justify-between mt-3">
                    <span className="mono text-[10px] text-muted">{node.workflow || "code"}</span>
                    <span className="mono text-[10px] text-muted">{node.agent || "codex"}</span>
                  </div>
                </button>
              );
            })}
          </div>
        </div>
      );
    }

    function TaskSubmitModal({ open, onClose, onSubmitted }) {
      const [task, setTask] = useState("");
      const [workflow, setWorkflow] = useState("code");
      const [agent, setAgent] = useState("codex");
      const [repo, setRepo] = useState("");
      const [busy, setBusy] = useState(false);
      const [error, setError] = useState("");

      useEffect(() => {
        if (!open) return;
        setError("");
      }, [open]);

      if (!open) return null;

      async function submit(e) {
        e.preventDefault();
        setBusy(true);
        setError("");
        try {
          const body = { task, workflow, agent };
          if (repo.trim()) body.repo = repo.trim();
          await fetchJson("/runs", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
          });
          setTask("");
          setRepo("");
          onSubmitted && onSubmitted();
          onClose();
        } catch (err) {
          setError(err.message || String(err));
        } finally {
          setBusy(false);
        }
      }

      return (
        <div className="fixed inset-0 z-50 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4">
          <form onSubmit={submit} className="w-full max-w-2xl rounded-2xl border border-line bg-panel p-6 shadow-glow space-y-4">
            <div className="flex items-center justify-between">
              <h3 className="text-lg font-semibold">Submit Task</h3>
              <button type="button" onClick={onClose} className="text-muted hover:text-white">Close</button>
            </div>
            <textarea
              value={task}
              onChange={(e) => setTask(e.target.value)}
              rows={5}
              className="w-full rounded-lg border border-line bg-shell p-3 text-sm"
              placeholder="Describe the task..."
            />
            <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
              <label className="text-xs text-muted">Workflow
                <select value={workflow} onChange={(e) => setWorkflow(e.target.value)} className="mt-1 w-full rounded-lg border border-line bg-shell p-2 text-sm mono">
                  {WORKFLOWS.map((w) => <option key={w} value={w}>{w}</option>)}
                </select>
              </label>
              <label className="text-xs text-muted">Agent
                <select value={agent} onChange={(e) => setAgent(e.target.value)} className="mt-1 w-full rounded-lg border border-line bg-shell p-2 text-sm mono">
                  {AGENTS.map((a) => <option key={a} value={a}>{a}</option>)}
                </select>
              </label>
              <label className="text-xs text-muted">Repo (optional)
                <input value={repo} onChange={(e) => setRepo(e.target.value)} className="mt-1 w-full rounded-lg border border-line bg-shell p-2 text-sm mono" />
              </label>
            </div>
            {error && <p className="text-sm text-red-300">{error}</p>}
            <div className="flex justify-end gap-2">
              <button type="button" onClick={onClose} className="rounded-lg border border-line px-4 py-2 text-sm">Cancel</button>
              <button type="submit" disabled={busy || !task.trim()} className="rounded-lg bg-code px-4 py-2 text-sm font-medium text-black disabled:opacity-40">
                {busy ? "Submitting..." : "Submit"}
              </button>
            </div>
          </form>
        </div>
      );
    }

    function DashboardView({ onOpenBuilder, onOpenExecution, onOpenBoards }) {
      const [health, setHealth] = useState(null);
      const [runs, setRuns] = useState([]);
      const [pipelines, setPipelines] = useState([]);
      const [submitOpen, setSubmitOpen] = useState(false);

      useEffect(() => {
        let stopped = false;
        async function tick() {
          try {
            const [h, r, p] = await Promise.all([
              fetchJson("/health"),
              fetchJson("/runs"),
              fetchJson("/pipelines"),
            ]);
            if (stopped) return;
            setHealth(h);
            setRuns(Array.isArray(r) ? r : []);
            setPipelines(Array.isArray(p) ? p : []);
          } catch {
            if (!stopped) setHealth(null);
          }
        }
        tick();
        const id = setInterval(tick, 3000);
        return () => {
          stopped = true;
          clearInterval(id);
        };
      }, []);

      const activeRuns = runs.filter((r) => r.status === "queued" || r.status === "running");
      const activePipelines = pipelines.slice().reverse().slice(0, 8);

      return (
        <div className="space-y-6">
          <div className="rounded-2xl border border-line bg-panel p-5 shadow-glow">
            <div className="flex flex-wrap items-center justify-between gap-4">
              <div>
                <h2 className="text-2xl font-semibold">forgectl</h2>
                <p className="text-sm text-muted mt-1">Local orchestration dashboard for agent runs and DAG pipelines</p>
              </div>
              <div className="flex items-center gap-2 text-sm">
                <span className={`h-2.5 w-2.5 rounded-full ${health ? "bg-content" : "bg-red-400"}`}></span>
                <span className="mono text-muted">{health ? "daemon healthy" : "daemon unavailable"}</span>
              </div>
            </div>
            <div className="flex flex-wrap gap-3 mt-5">
              <button onClick={onOpenBuilder} className="rounded-lg bg-code px-4 py-2 text-sm font-semibold text-black">New Pipeline</button>
              <button onClick={onOpenBoards} className="rounded-lg border border-line px-4 py-2 text-sm">Open Boards</button>
              <button onClick={() => setSubmitOpen(true)} className="rounded-lg border border-line px-4 py-2 text-sm">Submit Task</button>
            </div>
          </div>

          <div className="grid grid-cols-1 xl:grid-cols-2 gap-5">
            <section className="rounded-2xl border border-line bg-panel p-5">
              <div className="flex items-center justify-between mb-3">
                <h3 className="font-semibold">Active Pipelines</h3>
                <span className="mono text-xs text-muted">{activePipelines.length}</span>
              </div>
              <div className="space-y-3 max-h-[480px] overflow-auto pr-1">
                {activePipelines.length === 0 && <p className="text-sm text-muted">No pipeline runs yet.</p>}
                {activePipelines.map((pipeline) => (
                  <button
                    key={pipeline.id}
                    onClick={() => onOpenExecution(pipeline.id)}
                    className="w-full text-left rounded-xl border border-line bg-panel2 p-3 hover:border-code/60 transition"
                  >
                    <div className="flex items-center justify-between gap-2">
                      <span className="mono text-xs text-slate-300">{pipeline.id}</span>
                      <StatusPill status={pipeline.status || "pending"} />
                    </div>
                    <p className="text-sm mt-2">{pipeline.pipeline?.name || "pipeline"}</p>
                    <p className="mono text-[11px] text-muted mt-1">started {formatTime(pipeline.startedAt)}</p>
                    <div className="mt-2">
                      <MiniDagPreview pipeline={pipeline.pipeline} />
                    </div>
                  </button>
                ))}
              </div>
            </section>

            <section className="rounded-2xl border border-line bg-panel p-5">
              <div className="flex items-center justify-between mb-3">
                <h3 className="font-semibold">Active Runs</h3>
                <span className="mono text-xs text-muted">{activeRuns.length}</span>
              </div>
              <div className="space-y-3 max-h-[480px] overflow-auto pr-1">
                {activeRuns.length === 0 && <p className="text-sm text-muted">No active single runs.</p>}
                {activeRuns.map((run) => (
                  <div key={run.id} className="rounded-xl border border-line bg-panel2 p-3">
                    <div className="flex items-center justify-between gap-2">
                      <span className="mono text-xs text-slate-300">{run.id}</span>
                      <StatusPill status={run.status || "pending"} />
                    </div>
                    <p className="text-sm mt-2 line-clamp-2">{run.task}</p>
                    <div className="mono text-[11px] text-muted mt-2 flex gap-3">
                      <span>{run.workflow || "code"}</span>
                      <span>{formatTime(run.submittedAt)}</span>
                    </div>
                  </div>
                ))}
              </div>
            </section>
          </div>

          <TaskSubmitModal open={submitOpen} onClose={() => setSubmitOpen(false)} onSubmitted={() => {}} />
        </div>
      );
    }

    function PipelineNodeEditor({ node, nodeIds, onChange, onDelete }) {
      const deps = node.depends_on || [];
      const workflowColor = WORKFLOW_COLORS[node.workflow] || WORKFLOW_COLORS.general;

      function setField(field, value) {
        onChange({ ...node, [field]: value });
      }

      return (
        <div className="rounded-xl border border-line bg-panel2 p-4 space-y-3" style={{ borderLeftColor: workflowColor, borderLeftWidth: 3 }}>
          <div className="flex items-center justify-between gap-2">
            <label className="text-xs text-muted w-full">Node ID
              <input
                value={node.id}
                onChange={(e) => setField("id", slugify(e.target.value))}
                className="mt-1 w-full rounded-lg border border-line bg-shell p-2 text-sm mono"
              />
            </label>
            <button onClick={onDelete} className="h-9 px-3 rounded-lg border border-red-400/40 text-red-200 text-xs">Delete</button>
          </div>

          <label className="text-xs text-muted block">Task
            <textarea
              value={node.task}
              onChange={(e) => setField("task", e.target.value)}
              rows={4}
              className="mt-1 w-full rounded-lg border border-line bg-shell p-2 text-sm mono"
              placeholder="Prompt for this node"
            />
          </label>

          <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
            <label className="text-xs text-muted">Workflow
              <select value={node.workflow} onChange={(e) => setField("workflow", e.target.value)} className="mt-1 w-full rounded-lg border border-line bg-shell p-2 text-sm mono">
                {WORKFLOWS.map((w) => <option key={w} value={w}>{w}</option>)}
              </select>
            </label>
            <label className="text-xs text-muted">Agent
              <select value={node.agent} onChange={(e) => setField("agent", e.target.value)} className="mt-1 w-full rounded-lg border border-line bg-shell p-2 text-sm mono">

    function PipelineBuilderView({ initialPipeline, onBack, onRunPipeline }) {
      const [state, setState] = useState(() => normalizePipeline(initialPipeline || {
        name: "new-pipeline",
        description: "",
        defaults: { workflow: "code", agent: "codex", repo: "" },
        nodes: [],
      }));
      const [errors, setErrors] = useState([]);
      const [busy, setBusy] = useState(false);
      const [message, setMessage] = useState("");
      const [selectedNode, setSelectedNode] = useState(null);
      const [importText, setImportText] = useState("");

      useEffect(() => {
        if (initialPipeline) {
          setState(normalizePipeline(initialPipeline));
        }
      }, [initialPipeline]);

      const nodeIds = state.nodes.map((n) => n.id);
      const nodeStatusMap = useMemo(() => {
        const out = {};
        for (const n of state.nodes) out[n.id] = { status: "pending" };
        return out;
      }, [state.nodes]);

      function addNode() {
        const index = state.nodes.length + 1;
        const base = slugify(`node-${index}`);
        let id = base;
        let i = 2;
        while (nodeIds.includes(id)) {
          id = `${base}-${i}`;
          i += 1;
        }

        setState((prev) => ({
          ...prev,
          nodes: [...prev.nodes, {
            id,
            task: "",
            workflow: prev.defaults.workflow || "code",
            agent: prev.defaults.agent || "codex",
            repo: "",
            depends_on: [],
          }],
        }));
      }

      function updateNode(index, nextNode) {
        setState((prev) => {
          const nodes = prev.nodes.slice();
          nodes[index] = nextNode;
          return { ...prev, nodes };
        });
      }

      function removeNode(index) {
        setState((prev) => {
          const removedId = prev.nodes[index]?.id;
          const nodes = prev.nodes.filter((_, i) => i !== index).map((node) => ({
            ...node,
            depends_on: (node.depends_on || []).filter((id) => id !== removedId),
          }));
          return { ...prev, nodes };
        });
      }

      function runValidation() {
        const issues = validateBuilder(state);
        setErrors(issues);
        return issues.length === 0;
      }

      async function runPipeline() {
        if (!runValidation()) return;
        setBusy(true);
        setMessage("");
        try {
          const payload = { pipeline: toPipelineDefinition(state) };
          const result = await fetchJson("/pipelines", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          setMessage(`Pipeline submitted: ${result.id}`);
          onRunPipeline(result.id, payload.pipeline);
        } catch (err) {
          setMessage(err.message || String(err));
        } finally {
          setBusy(false);
        }
      }

      function dryRun() {
        const ok = runValidation();
        if (!ok) return;
        const levels = topologicalLevels(state.nodes);
        const ordered = state.nodes.slice().sort((a, b) => {
          const la = levels[a.id] || 0;
          const lb = levels[b.id] || 0;
          if (la !== lb) return la - lb;
          return a.id.localeCompare(b.id);
        });
        const lines = ordered.map((node, idx) => `${idx + 1}. ${node.id} [${node.workflow}/${node.agent}] deps: ${(node.depends_on || []).join(", ") || "(root)"}`);
        setMessage(`Dry run plan\n${lines.join("\n")}`);
      }

      function exportYaml() {
        if (!runValidation()) return;
        const yaml = window.jsyaml.dump(toPipelineDefinition(state), { lineWidth: 100 });
        const blob = new Blob([yaml], { type: "text/yaml" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `${state.name || "pipeline"}.yaml`;
        a.click();
        URL.revokeObjectURL(url);
      }

      function importYamlText(yamlText) {
        try {
          const parsed = window.jsyaml.load(yamlText);
          const next = normalizePipeline(parsed);
          setState(next);
          setErrors([]);
          setMessage("Pipeline imported from YAML");
        } catch (err) {
          setMessage(`Import failed: ${err.message || String(err)}`);
        }
      }

      return (
        <div className="space-y-5">
          <div className="flex items-center justify-between gap-3">
            <button onClick={onBack} className="rounded-lg border border-line px-3 py-2 text-sm">Back to Dashboard</button>
            <div className="flex items-center gap-2">
              <button onClick={addNode} className="rounded-lg border border-line px-3 py-2 text-sm">+ Add Node</button>
            </div>
          </div>

          <section className="rounded-2xl border border-line bg-panel p-5 space-y-4">
            <h2 className="text-xl font-semibold">Pipeline Builder</h2>
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <label className="text-xs text-muted">Pipeline Name
                <input value={state.name} onChange={(e) => setState((s) => ({ ...s, name: slugify(e.target.value) }))} className="mt-1 w-full rounded-lg border border-line bg-shell p-2 text-sm mono" />
              </label>
              <label className="text-xs text-muted">Description
                <input value={state.description} onChange={(e) => setState((s) => ({ ...s, description: e.target.value }))} className="mt-1 w-full rounded-lg border border-line bg-shell p-2 text-sm" />
              </label>
            </div>
            <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
              <label className="text-xs text-muted">Default Workflow
                <select value={state.defaults.workflow} onChange={(e) => setState((s) => ({ ...s, defaults: { ...s.defaults, workflow: e.target.value } }))} className="mt-1 w-full rounded-lg border border-line bg-shell p-2 text-sm mono">
                  {WORKFLOWS.map((w) => <option key={w} value={w}>{w}</option>)}
                </select>
              </label>
              <label className="text-xs text-muted">Default Agent
                <select value={state.defaults.agent} onChange={(e) => setState((s) => ({ ...s, defaults: { ...s.defaults, agent: e.target.value } }))} className="mt-1 w-full rounded-lg border border-line bg-shell p-2 text-sm mono">
                  {AGENTS.map((a) => <option key={a} value={a}>{a}</option>)}
                </select>
              </label>
              <label className="text-xs text-muted">Default Repo (optional)
                <input value={state.defaults.repo} onChange={(e) => setState((s) => ({ ...s, defaults: { ...s.defaults, repo: e.target.value } }))} className="mt-1 w-full rounded-lg border border-line bg-shell p-2 text-sm mono" />
              </label>
            </div>

            <div className="flex flex-wrap gap-2">
              <button onClick={runPipeline} disabled={busy} className="rounded-lg bg-code px-4 py-2 text-sm font-semibold text-black disabled:opacity-50">{busy ? "Running..." : "Run Pipeline"}</button>
              <button onClick={dryRun} className="rounded-lg border border-line px-4 py-2 text-sm">Dry Run</button>
              <button onClick={exportYaml} className="rounded-lg border border-line px-4 py-2 text-sm">Export YAML</button>
              <label className="rounded-lg border border-line px-4 py-2 text-sm cursor-pointer">
                Import YAML
                <input
                  type="file"
                  accept=".yaml,.yml,text/yaml,text/plain"
                  className="hidden"
                  onChange={(e) => {
                    const file = e.target.files && e.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = () => importYamlText(String(reader.result || ""));
                    reader.readAsText(file);
                  }}
                />
              </label>
            </div>

            <label className="text-xs text-muted block">Import/Paste YAML
              <textarea
                value={importText}
                onChange={(e) => setImportText(e.target.value)}
                rows={5}
                className="mt-1 w-full rounded-lg border border-line bg-shell p-2 text-sm mono"
                placeholder="Paste YAML here and click Parse YAML"
              />
            </label>
            <button onClick={() => importYamlText(importText)} className="rounded-lg border border-line px-3 py-2 text-sm">Parse YAML</button>

            {errors.length > 0 && (
              <div className="rounded-lg border border-red-400/30 bg-red-500/10 p-3">
                {errors.map((err, idx) => <p key={idx} className="text-sm text-red-200">- {err}</p>)}
              </div>
            )}
            {message && <pre className="mono text-xs whitespace-pre-wrap rounded-lg border border-line bg-shell p-3 text-slate-300">{message}</pre>}
          </section>

          <section className="rounded-2xl border border-line bg-panel p-5 space-y-3">
            <h3 className="font-semibold">DAG Preview</h3>
            <DagPreview nodes={state.nodes} nodeStates={nodeStatusMap} selectedNodeId={selectedNode} onSelectNode={setSelectedNode} />
          </section>

          <section className="space-y-3">
            {state.nodes.length === 0 && (
              <div className="rounded-xl border border-dashed border-line bg-panel p-5 text-sm text-muted">Add your first node to start building the DAG.</div>
            )}
            {state.nodes.map((node, index) => (
              <PipelineNodeEditor
                key={`${node.id}-${index}`}
                node={node}
                nodeIds={nodeIds}
                onChange={(next) => updateNode(index, next)}
                onDelete={() => removeNode(index)}
              />
            ))}
          </section>
        </div>
      );
    }

    function PipelineExecutionView({ pipelineId, onBack, onOpenExecution }) {
      const [pipeline, setPipeline] = useState(null);
      const [events, setEvents] = useState([]);
      const [liveStates, setLiveStates] = useState({});
      const [selectedNode, setSelectedNode] = useState(null);
      const [rerunNode, setRerunNode] = useState("");
      const [busy, setBusy] = useState(false);
      const [message, setMessage] = useState("");
      const logRef = useRef(null);

      useEffect(() => {
        let stopped = false;
        async function load() {
          try {
            const data = await fetchJson(`/pipelines/${pipelineId}`);
            if (!stopped) {
              setPipeline(data);
              const nodeIds = Object.keys(data.nodes || {});
              if (!selectedNode && nodeIds.length > 0) setSelectedNode(nodeIds[0]);
              if (!rerunNode && nodeIds.length > 0) setRerunNode(nodeIds[0]);
            }
          } catch (err) {
            if (!stopped) setMessage(err.message || String(err));
          }
        }
        load();
        const id = setInterval(load, 2500);
        return () => {
          stopped = true;
          clearInterval(id);
        };
      }, [pipelineId]);

      useEffect(() => {
        const es = new EventSource(`${API}/pipelines/${pipelineId}/events`);
        es.onmessage = (msg) => {
          try {
            const event = JSON.parse(msg.data);
            setEvents((prev) => {
              const next = [...prev, event];
              return next.slice(-600);
            });

            const nodeId = event?.data?.nodeId;
            if (nodeId) {
              setLiveStates((prev) => {
                const current = prev[nodeId] || {};
                const next = { ...current };
                if (event.type === "phase" && event.data.phase && String(event.data.phase).startsWith("node:")) {
                  next.status = event.data.status || current.status || "pending";
                  if (event.data.error) next.error = event.data.error;
                }
                if (event.type === "validation") next.validation = event.data.validation;
                if (event.type === "output") next.output = event.data.output;
                return { ...prev, [nodeId]: next };
              });
            }
          } catch {
            // ignore malformed events
          }
        };
        es.onerror = () => {};
        return () => es.close();
      }, [pipelineId]);

      useEffect(() => {
        if (!logRef.current) return;
        logRef.current.scrollTop = logRef.current.scrollHeight;
      }, [events, selectedNode]);

      const pipelineNodes = useMemo(() => pipeline?.pipeline?.nodes || [], [pipeline]);

      const mergedNodeStates = useMemo(() => {
        const base = { ...(pipeline?.nodes || {}) };
        for (const [id, state] of Object.entries(liveStates)) {
          base[id] = { ...(base[id] || {}), ...state };
        }
        return base;
      }, [pipeline, liveStates]);

      const selectedNodeState = selectedNode ? mergedNodeStates[selectedNode] : null;
      const selectedNodeDef = selectedNode ? pipelineNodes.find((n) => n.id === selectedNode) : null;
      const nodeEvents = selectedNode ? events.filter((evt) => evt?.data?.nodeId === selectedNode) : events;

      async function rerunFromNode() {
        if (!rerunNode) return;
        setBusy(true);
        setMessage("");
        try {
          const data = await fetchJson(`/pipelines/${pipelineId}/rerun`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ fromNode: rerunNode }),
          });
          onOpenExecution(data.id);
        } catch (err) {
          setMessage(err.message || String(err));
        } finally {
          setBusy(false);
        }
      }

      function revertHint() {
        setMessage("Revert checkpoints are available from CLI: forgectl pipeline revert --file <pipeline.yaml> --to <node> --pipeline-run <id>");
      }

      return (
        <div className="space-y-5">
          <div className="flex items-center justify-between gap-3">
            <button onClick={onBack} className="rounded-lg border border-line px-3 py-2 text-sm">Back</button>
            <div className="mono text-xs text-muted">pipeline {pipelineId}</div>
          </div>

          <section className="rounded-2xl border border-line bg-panel p-5">
            <div className="flex flex-wrap items-center justify-between gap-3">
              <div>
                <h2 className="text-xl font-semibold">{pipeline?.pipeline?.name || "Pipeline execution"}</h2>
                <p className="text-sm text-muted mt-1">Live status from SSE events</p>
              </div>
              <StatusPill status={pipeline?.status || "running"} />
            </div>
            <div className="flex flex-wrap gap-2 mt-4">
              <select value={rerunNode} onChange={(e) => setRerunNode(e.target.value)} className="rounded-lg border border-line bg-shell px-3 py-2 text-sm mono">
                {pipelineNodes.map((n) => <option key={n.id} value={n.id}>{n.id}</option>)}
              </select>
              <button onClick={rerunFromNode} disabled={busy} className="rounded-lg bg-code px-4 py-2 text-sm font-semibold text-black disabled:opacity-50">Rerun from...</button>
              <button onClick={revertHint} className="rounded-lg border border-line px-4 py-2 text-sm">Revert to...</button>
            </div>
            {message && <p className="text-sm text-amber-200 mt-3">{message}</p>}
          </section>

          <section className="rounded-2xl border border-line bg-panel p-5">
            <h3 className="font-semibold mb-3">Execution DAG</h3>
            <DagPreview nodes={pipelineNodes} nodeStates={mergedNodeStates} selectedNodeId={selectedNode} onSelectNode={setSelectedNode} />
          </section>

          <section className="grid grid-cols-1 xl:grid-cols-2 gap-5">
            <div className="rounded-2xl border border-line bg-panel p-5 space-y-3">
              <h3 className="font-semibold">Node Detail</h3>
              {!selectedNode && <p className="text-sm text-muted">Select a node.</p>}
              {selectedNode && (
                <>
                  <div className="flex items-center justify-between gap-2">
                    <div>
                      <p className="mono text-sm">{selectedNode}</p>
                      <p className="text-xs text-muted">{selectedNodeDef?.workflow || "code"} / {selectedNodeDef?.agent || "codex"}</p>
                    </div>
                    <StatusPill status={selectedNodeState?.status || "pending"} />
                  </div>

                  <div>
                    <p className="text-xs text-muted mb-1">Task Prompt</p>
                    <pre className="mono text-xs whitespace-pre-wrap rounded-lg border border-line bg-shell p-3 text-slate-300">{selectedNodeDef?.task || "-"}</pre>
                  </div>

                  <div>
                    <p className="text-xs text-muted mb-1">Validation</p>
                    <div className="rounded-lg border border-line bg-shell p-3 text-xs">
                      {(selectedNodeState?.result?.validation?.stepResults || selectedNodeState?.validation?.stepResults || []).length === 0 && <p className="text-muted">No validation data</p>}
                      {(selectedNodeState?.result?.validation?.stepResults || selectedNodeState?.validation?.stepResults || []).map((step, idx) => (
                        <p key={idx} className={step.passed ? "text-content" : "text-red-300"}>
                          {step.passed ? "PASS" : "FAIL"} {step.name} ({step.attempts} attempts)
                        </p>
                      ))}
                    </div>
                  </div>

                  <div>
                    <p className="text-xs text-muted mb-1">Output Summary</p>
                    <div className="rounded-lg border border-line bg-shell p-3 text-xs mono text-slate-300 space-y-1">
                      {!selectedNodeState?.result?.output && !selectedNodeState?.output && <p className="text-muted">No output yet</p>}
                      {(selectedNodeState?.result?.output?.mode === "git" || selectedNodeState?.output?.mode === "git") && (
                        <>
                          <p>mode: git</p>
                          <p>branch: {(selectedNodeState?.result?.output?.branch || selectedNodeState?.output?.branch || "-")}</p>
                          <p>files changed: {(selectedNodeState?.result?.output?.filesChanged ?? selectedNodeState?.output?.filesChanged ?? "-")}</p>
                        </>
                      )}
                      {(selectedNodeState?.result?.output?.mode === "files" || selectedNodeState?.output?.mode === "files") && (
                        <>
                          <p>mode: files</p>
                          <p>dir: {(selectedNodeState?.result?.output?.dir || selectedNodeState?.output?.dir || "-")}</p>
                          <p>files: {(selectedNodeState?.result?.output?.files || selectedNodeState?.output?.files || []).length}</p>
                        </>
                      )}
                      <p>duration: {durationMs(selectedNodeState)}</p>
                    </div>
                  </div>
                </>
              )}
            </div>

            <div className="rounded-2xl border border-line bg-panel p-5">
              <h3 className="font-semibold mb-3">Agent Output / Events</h3>
              <div ref={logRef} className="h-[420px] overflow-auto rounded-lg border border-line bg-shell p-3 space-y-2">
                {nodeEvents.length === 0 && <p className="text-sm text-muted">Waiting for events...</p>}
                {nodeEvents.map((evt, idx) => (
                  <div key={idx} className="mono text-[11px] text-slate-300 border-b border-line/60 pb-2">
                    <div className="flex items-center justify-between gap-2 mb-1">
                      <span className="text-muted">{formatTime(evt.timestamp)}</span>
                      <span className="uppercase tracking-wide" style={{ color: STATUS_COLORS[evt?.data?.status] || "#94a3b8" }}>{evt.type}</span>
                    </div>
                    <pre className="whitespace-pre-wrap break-words">{JSON.stringify(evt.data, null, 2)}</pre>
                  </div>
                ))}
              </div>
            </div>
          </section>
        </div>
      );
    }

      const [board, setBoard] = useState(null);
      const [registerFile, setRegisterFile] = useState("");
      const [cardTitle, setCardTitle] = useState("");
      const [cardType, setCardType] = useState("");
      const [cardParams, setCardParams] = useState("{}");
      const [busy, setBusy] = useState(false);
      const [message, setMessage] = useState("");
      const [error, setError] = useState("");

      useEffect(() => {
        let stopped = false;
        async function load() {
          try {
            const list = await fetchJson("/boards");
            if (stopped) return;
            const nextBoards = Array.isArray(list) ? list : [];
            setBoards(nextBoards);

            const activeBoardId = boardId || nextBoards[0]?.id || "";
            if (!activeBoardId) {
              setBoard(null);
              return;
            }
            if (activeBoardId !== boardId) {
              setBoardId(activeBoardId);
            }
            const detail = await fetchJson(`/boards/${activeBoardId}`);
            if (!stopped) {
              setBoard(detail);
            }
          } catch (err) {
            if (!stopped) setError(err.message || String(err));
          }
        }
        load();
        const id = setInterval(load, 4000);
        return () => {
          stopped = true;
          clearInterval(id);
        };
      }, [boardId]);

      async function refreshBoard() {
        if (!boardId) return;
        const detail = await fetchJson(`/boards/${boardId}`);
        setBoard(detail);
      }

      async function registerBoard() {
        if (!registerFile.trim()) return;
        setBusy(true);
        setError("");
        setMessage("");
        try {
          const created = await fetchJson("/boards", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ file: registerFile.trim() }),
          });
          setMessage(`Board registered: ${created.boardId}`);
          const list = await fetchJson("/boards");
          const nextBoards = Array.isArray(list) ? list : [];
          setBoards(nextBoards);
          setBoardId(created.boardId || nextBoards[0]?.id || "");
        } catch (err) {
          setError(err.message || String(err));
        } finally {
          setBusy(false);
        }
      }

        if (!boardId || !cardTitle.trim() || !cardType.trim()) return;
        setBusy(true);
        setError("");
        setMessage("");
        try {
          let parsed = {};
          try {
            parsed = cardParams.trim() ? JSON.parse(cardParams) : {};
          } catch (err) {
            throw new Error(`Invalid params JSON: ${err.message || String(err)}`);
          }
          await fetchJson(`/boards/${boardId}/cards`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              title: cardTitle.trim(),
              type: cardType.trim(),
              params: parsed,
            }),
          });
          setCardTitle("");
          setCardParams("{}");
          await refreshBoard();
        } catch (err) {
          setError(err.message || String(err));
        } finally {
          setBusy(false);
        }
      }

      async function moveCard(cardId, column) {
        setBusy(true);
        setError("");
        try {
          await fetchJson(`/boards/${boardId}/cards/${cardId}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ column }),
          });
          await refreshBoard();
        } catch (err) {
          setError(err.message || String(err));
        } finally {
          setBusy(false);
        }
      }

      async function triggerCard(cardId) {
        setBusy(true);
        setError("");
        try {
          const data = await fetchJson(`/boards/${boardId}/cards/${cardId}/trigger`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ mode: "manual" }),
          });
          setMessage(`Triggered run: ${data.runId}`);
          await refreshBoard();
        } catch (err) {
          setError(err.message || String(err));
        } finally {
          setBusy(false);
        }
      }

      const cardTypes = board ? Object.keys(board.templates || {}) : [];

      return (
        <div className="space-y-5">
          <div className="flex items-center justify-between gap-3">
            <button onClick={onBack} className="rounded-lg border border-line px-3 py-2 text-sm">Back</button>
            <span className="mono text-xs text-muted">internal board orchestration</span>
          </div>

          <section className="rounded-2xl border border-line bg-panel p-5 space-y-3">
            <h2 className="text-xl font-semibold">Boards</h2>
            <div className="grid grid-cols-1 lg:grid-cols-[2fr_1fr] gap-3">
              <input
                value={registerFile}
                onChange={(e) => setRegisterFile(e.target.value)}
                className="rounded-lg border border-line bg-shell p-2 text-sm mono"
                placeholder="/absolute/path/to/board.yaml"
              />
              <button onClick={registerBoard} disabled={busy || !registerFile.trim()} className="rounded-lg bg-code px-4 py-2 text-sm font-semibold text-black disabled:opacity-50">Register Board</button>
            </div>
            <div className="flex flex-wrap gap-2">
              {boards.map((entry) => (
                <button
                  key={entry.id}
                  onClick={() => setBoardId(entry.id)}
                  className={`rounded-lg px-3 py-1.5 text-sm mono ${entry.id === boardId ? "bg-panel2 border border-line" : "border border-line text-muted"}`}
                >
                  {entry.id}
                </button>
              ))}
            </div>
          </section>

          <section className="grid grid-cols-1 xl:grid-cols-[1.1fr_1.9fr] gap-5">
            <div className="rounded-2xl border border-line bg-panel p-5 space-y-3">
              <h3 className="font-semibold">Create Card</h3>
              <label className="text-xs text-muted block">Title
                <input value={cardTitle} onChange={(e) => setCardTitle(e.target.value)} className="mt-1 w-full rounded-lg border border-line bg-shell p-2 text-sm" />
              </label>
              <label className="text-xs text-muted block">Type
                <select value={cardType} onChange={(e) => setCardType(e.target.value)} className="mt-1 w-full rounded-lg border border-line bg-shell p-2 text-sm mono">
                  <option value="">Select type</option>
                  {cardTypes.map((type) => <option key={type} value={type}>{type}</option>)}
                </select>
              </label>
              <label className="text-xs text-muted block">Params JSON
                <textarea value={cardParams} onChange={(e) => setCardParams(e.target.value)} rows={5} className="mt-1 w-full rounded-lg border border-line bg-shell p-2 text-sm mono" />
              </label>
              <button onClick={createCard} disabled={busy || !boardId || !cardTitle.trim() || !cardType.trim()} className="rounded-lg border border-line px-4 py-2 text-sm disabled:opacity-40">Create Card</button>
            </div>

            <div className="rounded-2xl border border-line bg-panel p-5 space-y-3">
              <div className="flex items-center justify-between gap-2">
                <h3 className="font-semibold">Cards</h3>
                <span className="mono text-xs text-muted">{board?.cards?.length || 0}</span>
              </div>
              {!boardId && <p className="text-sm text-muted">Register or select a board.</p>}
              {boardId && (!board || !Array.isArray(board.cards) || board.cards.length === 0) && <p className="text-sm text-muted">No cards yet.</p>}
              <div className="space-y-3 max-h-[560px] overflow-auto pr-1">
                {(board?.cards || []).map((card) => {
                  const latestRun = card.runHistory && card.runHistory.length > 0 ? card.runHistory[card.runHistory.length - 1] : null;
                  return (
                    <div key={card.id} className="rounded-xl border border-line bg-panel2 p-3 space-y-3">
                      <div className="flex items-center justify-between gap-2">
                        <div>
                          <p className="mono text-sm">{card.id}</p>
                          <p className="text-sm">{card.title}</p>
                          <p className="mono text-[11px] text-muted mt-1">type {card.type}</p>
                        </div>
                        <StatusPill status={latestRun?.status || "pending"} />
                      </div>

                      <div className="flex flex-wrap gap-2 items-center">
                        <select
                          value={card.column}
                          onChange={(e) => moveCard(card.id, e.target.value)}
                          className="rounded-lg border border-line bg-shell px-2 py-1.5 text-xs mono"
                        >
                          {(board?.columns || []).map((column) => <option key={column} value={column}>{column}</option>)}
                        </select>
                        <button onClick={() => triggerCard(card.id)} disabled={busy} className="rounded-lg border border-line px-3 py-1.5 text-xs">Trigger Run</button>
                      </div>

                      <div className="rounded-lg border border-line bg-shell p-2">
                        <p className="text-xs text-muted mb-1">Recent runs</p>
                        {(card.runHistory || []).slice(-3).reverse().map((run) => (
                          <div key={run.runId} className="mono text-[11px] flex items-center justify-between gap-2 py-1">
                            <button onClick={() => onOpenExecution(run.runId)} className="text-code hover:underline">{run.runId}</button>
                            <span>{run.triggerMode}</span>
                            <span>{run.status}</span>
                          </div>
                        ))}
                        {(!card.runHistory || card.runHistory.length === 0) && <p className="text-xs text-muted">No runs yet</p>}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </section>

          {error && <p className="text-sm text-red-300">{error}</p>}
          {message && <p className="text-sm text-amber-200">{message}</p>}
        </div>
      );
    }

    function App() {
      const [view, setView] = useState("dashboard");
      const [activePipelineId, setActivePipelineId] = useState(null);
      const [builderPipeline, setBuilderPipeline] = useState(null);
      const [health, setHealth] = useState(null);

      useEffect(() => {
        let stop = false;
        async function ping() {
          try {
            const data = await fetchJson("/health");
            if (!stop) setHealth(data);
          } catch {
            if (!stop) setHealth(null);
          }
        }
        ping();
        const id = setInterval(ping, 4000);
        return () => {
          stop = true;
          clearInterval(id);
        };
      }, []);

      function openExecution(id) {
        setActivePipelineId(id);
        setView("execution");
      }

      return (
        <div className="grid-noise min-h-screen">
          <header className="sticky top-0 z-30 border-b border-line bg-shell/90 backdrop-blur px-5 py-3">
            <div className="max-w-[1400px] mx-auto flex items-center justify-between gap-4">
              <div className="flex items-center gap-4">
                <button onClick={() => setView("dashboard")} className="text-lg font-bold tracking-tight">forgectl</button>
                <span className="mono text-xs px-2 py-1 rounded border border-line bg-panel2 text-muted">pipeline builder</span>
              </div>
              <div className="flex items-center gap-3">
                <span className="flex items-center gap-2 mono text-xs text-muted">
                  <span className={`h-2 w-2 rounded-full ${health ? "bg-content" : "bg-red-400"}`}></span>
                  {health ? "healthy" : "offline"}
                </span>
                <button onClick={() => setView("dashboard")} className={`rounded-lg px-3 py-1.5 text-sm ${view === "dashboard" ? "bg-panel2 border border-line" : "text-muted"}`}>Dashboard</button>
                <button onClick={() => setView("builder")} className={`rounded-lg px-3 py-1.5 text-sm ${view === "builder" ? "bg-panel2 border border-line" : "text-muted"}`}>Builder</button>
                <button onClick={() => setView("boards")} className={`rounded-lg px-3 py-1.5 text-sm ${view === "boards" ? "bg-panel2 border border-line" : "text-muted"}`}>Boards</button>
              </div>
            </div>
          </header>

          <main className="max-w-[1400px] mx-auto p-5">
            {view === "dashboard" && (
              <DashboardView
                onOpenBuilder={() => setView("builder")}
                onOpenExecution={openExecution}
                onOpenBoards={() => setView("boards")}
              />
            )}

            {view === "builder" && (
              <PipelineBuilderView
                initialPipeline={builderPipeline}
                onBack={() => setView("dashboard")}
                onRunPipeline={(id, pipelineDef) => {
                  setBuilderPipeline(pipelineDef);
                  openExecution(id);
                }}
              />
            )}

            {view === "execution" && activePipelineId && (
              <PipelineExecutionView
                pipelineId={activePipelineId}
                onBack={() => setView("dashboard")}
                onOpenExecution={openExecution}
              />
            )}

            {view === "boards" && (
              <BoardView
                onBack={() => setView("dashboard")}
                onOpenExecution={openExecution}
              />
            )}
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
